name: Argus
options:
  bundleIdPrefix: com.argus
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    # GhosttyKit.xcframework is arm64-only (see scripts/build-ghosttykit.sh) —
    # Argus must match or the x86_64 slice fails to link.
    ARCHS: "arm64"
    ONLY_ACTIVE_ARCH: YES

targets:
  Argus:
    type: application
    platform: macOS
    sources:
      - path: Argus
        excludes:
          - "**/.DS_Store"
          - "Resources/ArgusTerminalTheme.ghostty"
          - "Resources/pierre-diffs-bundle.js"
      - path: Argus/Resources/ArgusTerminalTheme.ghostty
        buildPhase: resources
      - path: Argus/Resources/pierre-diffs-bundle.js
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.argus.app
        PRODUCT_NAME: Argus
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_GENERATION_MODE: GeneratedByBuildSystem
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Argus
        INFOPLIST_KEY_CFBundleName: Argus
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        SWIFT_OBJC_BRIDGING_HEADER: Argus/Resources/Argus-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks/GhosttyKit.xcframework/macos-arm64/Headers"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks/GhosttyKit.xcframework/macos-arm64"
        OTHER_LDFLAGS:
          - "-lghostty"
          - "-framework Metal"
          - "-framework MetalKit"
          - "-framework QuartzCore"
          - "-framework IOSurface"
          - "-framework UniformTypeIdentifiers"
          - "-framework Carbon"
          - "-framework WebKit"
          - "-lz"
          - "-lc++"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
    dependencies: []

  ArgusTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Argus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.argus.tests
        GENERATE_INFOPLIST_FILE: YES
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks/GhosttyKit.xcframework/macos-arm64/Headers"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Argus.app/Contents/MacOS/Argus"
        BUNDLE_LOADER: "$(TEST_HOST)"
