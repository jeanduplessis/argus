name: Argus
options:
  bundleIdPrefix: com.argus
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  Argus:
    type: application
    platform: macOS
    sources:
      - path: Argus
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.argus.app
        PRODUCT_NAME: Argus
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_GENERATION_MODE: GeneratedByBuildSystem
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Argus
        INFOPLIST_KEY_CFBundleName: Argus
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        SWIFT_OBJC_BRIDGING_HEADER: Argus/Resources/Argus-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks/GhosttyKit.xcframework/macos-arm64_x86_64/Headers"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks/GhosttyKit.xcframework/macos-arm64_x86_64"
        OTHER_LDFLAGS:
          - "-lghostty"
          - "-framework Metal"
          - "-framework MetalKit"
          - "-framework QuartzCore"
          - "-framework IOSurface"
          - "-framework UniformTypeIdentifiers"
          - "-framework Carbon"
          - "-lz"
          - "-lc++"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
    dependencies: []
