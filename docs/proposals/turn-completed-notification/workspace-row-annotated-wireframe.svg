<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title description">
  <title id="title">Workspace row turn-completion attention wireframe</title>
  <desc id="description">Annotated wireframe showing an unselected Argus Workspace row with a bell replacing the Agent Status or Workspace type icon while another Workspace remains selected.</desc>
  <defs>
    <style>
      .page { fill: #f7f7f5; }
      .sidebar { fill: #ffffff; stroke: #232323; stroke-width: 2; }
      .header { fill: #f0f0ee; stroke: #6e6e68; stroke-width: 1.5; }
      .row { fill: #ffffff; stroke: #a5a59f; stroke-width: 1; }
      .selected { fill: #57575d; stroke: #303035; stroke-width: 1.5; }
      .attention-row { fill: #fff9ec; stroke: #c48a25; stroke-width: 1.5; }
      .ink { fill: #252525; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { fill: #252525; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { fill: #666660; font-size: 15px; }
      .ui { font-size: 15px; font-weight: 600; }
      .ui-small { font-size: 12px; }
      .legend-heading { font-size: 17px; font-weight: 700; }
      .legend-term { font-size: 14px; font-weight: 700; }
      .legend-note { fill: #666660; font-size: 12px; }
      .selected-text { fill: #ffffff; }
      .selected-secondary { fill: #d5d5d8; }
      .bell { fill: none; stroke: #b56b00; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
      .annotation { fill: none; stroke: #c63b32; stroke-width: 1.5; stroke-dasharray: 5 4; }
      .leader { fill: none; stroke: #c63b32; stroke-width: 1.4; }
      .marker { fill: #c63b32; stroke: #ffffff; stroke-width: 2; }
      .marker-text { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; text-anchor: middle; dominant-baseline: central; }
    </style>
    <g id="folder-icon">
      <path d="M1 4 H6 L8 6 H15 V15 H1 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
    <g id="bell-icon">
      <path class="bell" d="M4 12.5 H12 M5 12.5 V8 C5 5.4 6.2 4 8 4 C9.8 4 11 5.4 11 8 V12.5 M6.7 14.2 C7 15 7.4 15.4 8 15.4 C8.6 15.4 9 15 9.3 14.2 M7 3 C7 2.4 7.4 2 8 2 C8.6 2 9 2.4 9 3"/>
    </g>
  </defs>

  <rect class="page" width="1280" height="720"/>
  <text class="ink title" x="54" y="50">Workspace row attention</text>
  <text class="ink subtitle" x="54" y="76">Turn Completion Attention summarized in the left sidebar</text>

  <rect class="sidebar" x="54" y="110" width="500" height="500" rx="8"/>
  <rect class="header" x="54" y="110" width="500" height="72" rx="8"/>
  <text class="ink ui-small" x="78" y="155" letter-spacing="1.2">PROJECTS</text>
  <line x1="54" y1="182" x2="554" y2="182" stroke="#8e8e88"/>

  <text class="ink ui" x="78" y="220">Argus</text>

  <rect class="selected" x="78" y="242" width="452" height="72" rx="6"/>
  <text class="mono ui-small selected-secondary" x="94" y="282">1</text>
  <g transform="translate(120 265)" style="color:#fff"><use href="#folder-icon"/></g>
  <text class="ink ui selected-text" x="152" y="273">Main Workspace</text>
  <text class="ink ui-small selected-secondary" x="152" y="295">main</text>
  <rect x="490" y="266" width="26" height="22" rx="4" fill="#737379" stroke="#98989d"/>
  <text class="ink ui-small selected-text" x="503" y="281" text-anchor="middle">2</text>

  <rect class="attention-row" x="78" y="326" width="452" height="72" rx="6"/>
  <text class="mono ui-small" x="94" y="366">2</text>
  <g transform="translate(120 348)"><use href="#bell-icon"/></g>
  <text class="ink ui" x="152" y="357">Notifications</text>
  <text class="ink ui-small" x="152" y="379" fill="#666660">feature/notifications</text>
  <rect x="490" y="350" width="26" height="22" rx="4" fill="#e0e0dc" stroke="#aaa"/>
  <text class="ink ui-small" x="503" y="365" text-anchor="middle">3</text>

  <rect class="row" x="78" y="410" width="452" height="72" rx="6"/>
  <text class="mono ui-small" x="94" y="450">3</text>
  <g transform="translate(120 433)" style="color:#555"><use href="#folder-icon"/></g>
  <text class="ink ui" x="152" y="441">Settings</text>
  <text class="ink ui-small" x="152" y="463" fill="#666660">feature/settings</text>

  <rect class="annotation" x="72" y="320" width="464" height="84" rx="8"/>
  <rect class="annotation" x="114" y="342" width="28" height="30" rx="5"/>
  <path class="leader" d="M142 337 C255 285 650 266 700 266"/>
  <path class="leader" d="M530 364 C610 364 650 378 700 378"/>
  <path class="leader" d="M304 402 C430 510 610 492 700 492"/>

  <g><circle class="marker" cx="78" cy="326" r="12"/><text class="marker-text" x="78" y="326">1</text></g>
  <g><circle class="marker" cx="135" cy="342" r="12"/><text class="marker-text" x="135" y="342">2</text></g>
  <g><circle class="marker" cx="530" cy="364" r="12"/><text class="marker-text" x="530" y="364">3</text></g>
  <g><circle class="marker" cx="304" cy="398" r="12"/><text class="marker-text" x="304" y="398">4</text></g>

  <text class="ink legend-heading" x="700" y="130">Annotations</text>
  <line x1="700" y1="146" x2="1220" y2="146" stroke="#8e8e88"/>

  <g transform="translate(700 184)">
    <circle class="marker" cx="13" cy="13" r="12"/><text class="marker-text" x="13" y="13">1</text>
    <text class="ink legend-term" x="36" y="10">Workspace with pending attention</text>
    <text class="ink legend-note" x="36" y="30">The row remains unselected; receiving the event does not navigate.</text>
  </g>
  <g transform="translate(700 296)">
    <circle class="marker" cx="13" cy="13" r="12"/><text class="marker-text" x="13" y="13">2</text>
    <text class="ink legend-term" x="36" y="10">Turn-completion bell</text>
    <text class="ink legend-note" x="36" y="30">Replaces live Agent Status and Workspace-type icons while attention is pending.</text>
  </g>
  <g transform="translate(700 408)">
    <circle class="marker" cx="13" cy="13" r="12"/><text class="marker-text" x="13" y="13">3</text>
    <text class="ink legend-term" x="36" y="10">Top-level Tab count remains unchanged</text>
    <text class="ink legend-note" x="36" y="30">The bell is not a count badge and does not move the trailing tab-count region.</text>
  </g>
  <g transform="translate(700 520)">
    <circle class="marker" cx="13" cy="13" r="12"/><text class="marker-text" x="13" y="13">4</text>
    <text class="ink legend-term" x="36" y="10">Workspace summary behavior</text>
    <text class="ink legend-note" x="36" y="30">The bell remains while any inactive Top-level Tab in this Workspace needs attention.</text>
  </g>

  <rect x="700" y="614" width="520" height="66" rx="7" fill="#eeeeeb" stroke="#aaa9a2"/>
  <text class="ink legend-note" x="724" y="640">Selecting this Workspace clears attention only if its affected tab is already active</text>
  <text class="ink legend-note" x="724" y="660">and the Argus main window is key. Inactive affected tabs keep their bell.</text>
</svg>
